#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "formbricks"
name = "Formbricks"
description.en = "Survey Platform"
description.fr = "Plateforme d'enquête"

version = "5.1.2~ynh1"

maintainers = ["eric_G"]

[upstream]
license = "AGPL-3.0-only"
website = "https://formbricks.com/"
admindoc = "https://formbricks.com/docs/developer-docs/contributing/get-started#local-machine-setup"
code = "https://github.com/formbricks/formbricks"

[integration]
yunohost = ">= 12.0.9"
helpers_version = "2.1"
architectures = "all"
multi_instance = true

ldap = false

sso = false

disk = "50M"
ram.build = "50M"
ram.runtime = "50M"

[install]
    [install.domain]
    type = "domain"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]

    [resources.sources]

    [resources.sources.main]
    url = "https://github.com/formbricks/formbricks/archive/refs/tags/5.1.2.tar.gz"
    sha256 = "77a78dda130ac21b44affe15d2f8218ed7f18f75b6d083134545a329d65465ca"

    # autoupdate.strategy = "latest_github_tag"

    [resources.system_user]
    allow_email = true
    
    [resources.install_dir]

    [resources.data_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
    main.default=3000
    cubejs.default=4000

    [resources.apt]
    packages = "postgresql, redis-server"

    [resources.database]
    type = "postgresql"

    [resources.nodejs]
    version = "20"